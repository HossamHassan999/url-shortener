version: "3.9"

services:

  db:
    image: postgres:15
    container_name: shortener_db
    restart: always
    environment:
      POSTGRES_DB: shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shortener_redis
    ports:
      - "6380:6379"

  api:
    build: .
    container_name: shortener_api
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --reload
      --workers 3
      --access-logfile -
      --error-logfile -
      --log-level info
    volumes:
      - ./app:/app
      - ./staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
